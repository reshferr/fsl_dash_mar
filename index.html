<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FSL Lançamentos - Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--f:'Inter',system-ui,sans-serif;--fn:'Inter',system-ui,sans-serif;--tr:.18s ease;--r:14px;--rs:10px;--nh:68px;}
[data-theme=dark]{--bg:#0c0c10;--sf:#16161c;--cd:#19191f;--cdh:#21212a;--nav:rgba(12,12,16,.97);--bd:rgba(255,255,255,.1);--bda:rgba(255,255,255,.18);--tx:#f0f0f8;--tx2:#a8a8c8;--tx3:#6868a0;--acc:#7c5cfc;--accg:rgba(124,92,252,.16);--pos:#34d399;--neg:#f87171;--wrn:#fbbf24;--tagt:#a78bfa;--grd:rgba(255,255,255,.06);--sh:0 6px 28px rgba(0,0,0,.6);--sh2:0 1px 6px rgba(0,0,0,.35);}
[data-theme=light]{--bg:#f0f0f8;--sf:#ffffff;--cd:#ffffff;--cdh:#f6f6fc;--nav:rgba(240,240,248,.97);--bd:rgba(0,0,0,.07);--bda:rgba(0,0,0,.11);--tx:#0e0e1a;--tx2:#4a4a68;--tx3:#7878a8;--acc:#5e38ec;--accg:rgba(94,56,236,.06);--pos:#1a6e48;--neg:#a82828;--wrn:#7a5000;--tagt:#5e38ec;--grd:rgba(0,0,0,.03);--sh:0 2px 12px rgba(0,0,0,.06);--sh2:0 1px 3px rgba(0,0,0,.04);}
[data-theme=beige]{--bg:#e8dfd4;--sf:#fdf6ed;--cd:#fdf6ed;--cdh:#f3e9dc;--nav:rgba(232,223,212,.97);--bd:rgba(110,80,40,.13);--bda:rgba(90,60,20,.18);--tx:#1c1208;--tx2:#6b4e2e;--tx3:#907050;--acc:#7a5530;--accg:rgba(122,85,48,.08);--pos:#2a5030;--neg:#782020;--wrn:#7a5000;--tagt:#7a5530;--grd:rgba(90,60,20,.05);--sh:0 2px 10px rgba(40,22,6,.11);--sh2:0 1px 3px rgba(40,22,6,.07);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100dvh;transition:background var(--tr),color var(--tr);-webkit-font-smoothing:antialiased;}
header{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nh);background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.ni{height:100%;max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:800;letter-spacing:-.03em;}
.logo em{color:var(--acc);font-style:normal;}
main{max-width:1200px;margin:0 auto;padding:calc(var(--nh) + 20px) 16px 100px;}

/* Estilos de Cards e KPIs */
.hero-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:12px;margin-bottom:24px;}
.kh{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:22px;box-shadow:var(--sh2);position:relative;display:flex;flex-direction:column;gap:8px;}
.kh-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;}
.kh-val{font-size:32px;font-weight:800;letter-spacing:-.04em;color:var(--tx);}
.kh-val.big{font-size:38px;}
.kh-val.sm{font-size:24px;}

/* Seções */
.card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:20px;box-shadow:var(--sh2);}
.slbl{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--tx);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.badge.pos{background:rgba(52,211,153,.15);color:var(--pos);}
.badge.neg{background:rgba(248,113,113,.15);color:var(--neg);}

/* Loader */
#loader{text-align:center;padding:100px 0;}
.spin{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:768px){.grid-2{grid-template-columns:1fr;}}
</style>
</head>
<body data-theme="dark">

<header>
  <div class="ni">
    <div class="logo">FSL <em>Digital</em></div>
    <div class="tsw">
       <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')" style="background:var(--cd);border:1px solid var(--bd);color:var(--tx);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;">Trocar Tema</button>
    </div>
  </div>
</header>

<main>
  <div id="loader"><div class="spin"></div><p>Carregando dados da Faculdade Sírio-Libanês...</p></div>
  <div id="dashboard-content" style="display:none;">
    
    <div class="hero-row" id="kpi-hero"></div>

    <div class="grid-2">
      <div class="card">
        <div class="slbl">Leads por Curso</div>
        <div id="leads-list"></div>
      </div>
      <div class="card">
        <div class="slbl">Taxa de Qualificação</div>
        <div id="qual-list"></div>
      </div>
    </div>

    <div class="card" id="section-meta">
        </div>

  </div>
</main>

<script>
// Configurações da Planilha
const PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6iHhSHZBcAWYSw8wlRwyX7r6_jUnaULqG4uyt9dDG578kCD_N-j0NanrwJZvoDOyFidHmc_vaMAVj/pub?output=csv';
const DB_GID = '256138654';
const META_GID = '1630113902';
const VISAO_GID = '2017419602';

let DATA_SUMMARY = [];
let DATA_VISAO = { invTotal: 0, invMeta: 0 };
let _cursoFiltro = '__all__';

// Helper: Parser de CSV simplificado
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
    let obj = {};
    headers.forEach((h, i) => obj[h] = values[i]);
    return obj;
  });
}

// Helper: Limpeza de números
function n(v) {
  if (!v) return 0;
  let s = v.toString().replace(/R\$\s?/, '').replace(/\./g, '').replace(',', '.');
  return parseFloat(s) || 0;
}

function fmt(v) { return Math.round(v).toLocaleString('pt-BR'); }
function fmtR(v) { return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

async function init() {
  try {
    // Carregamento paralelo para performance
    const [resSummary, resVisao] = await Promise.all([
      fetch(PUB),
      fetch(`${PUB}&gid=${VISAO_GID}`)
    ]);

    const textSummary = await resSummary.text();
    DATA_SUMMARY = parseCSV(textSummary);

    const textVisao = await resVisao.text();
    const rowsVisao = parseCSV(textVisao);
    
    // Lógica simples para pegar investimento total (ajuste conforme sua aba Visão)
    DATA_VISAO.invTotal = n(rowsVisao[0]?.["Investimento"] || rowsVisao[0]?.["INVESTIMENTO"] || 0);

    renderAll();
    
    document.getElementById('loader').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
  } catch (e) {
    console.error("Erro ao carregar:", e);
    document.getElementById('loader').innerHTML = `<p style="color:red">Erro na conexão com a planilha. Verifique se está publicada.</p>`;
  }
}

function renderAll() {
  renderHeroes();
  renderLists();
}

function renderHeroes() {
  const container = document.getElementById('kpi-hero');
  if (!container) return;

  const totalLeads = DATA_SUMMARY.reduce((acc, row) => acc + n(row["Total"] || row["Leads"] || 0), 0);
  const qualMedia = DATA_SUMMARY.reduce((acc, row) => acc + n(row["Qualificação"] || row["Taxa"] || 0), 0) / DATA_SUMMARY.length;
  
  const inv = DATA_VISAO.invTotal || 0;
  const cpl = totalLeads > 0 ? inv / totalLeads : 0;

  container.innerHTML = `
    <div class="kh">
      <div class="kh-lbl">Total Leads</div>
      <div class="kh-val big">${fmt(totalLeads)}</div>
    </div>
    <div class="kh">
      <div class="kh-lbl">Investimento Realizado</div>
      <div class="kh-val sm">${fmtR(inv)}</div>
    </div>
    <div class="kh">
      <div class="kh-lbl">CPL Geral</div>
      <div class="kh-val">${fmtR(cpl)}</div>
    </div>
    <div class="kh">
      <div class="kh-lbl">Taxa de Qualificação</div>
      <div class="kh-val">${qualMedia.toFixed(1)}%</div>
    </div>
  `;
}

function renderLists() {
  const leadsContainer = document.getElementById('leads-list');
  const qualContainer = document.getElementById('qual-list');

  const sortedLeads = [...DATA_SUMMARY].sort((a, b) => n(b["Total"]) - n(a["Total"]));
  
  leadsContainer.innerHTML = sortedLeads.map(row => `
    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--bd);">
      <span style="font-size:13px; font-weight:600;">${row["Curso"] || row["HUB"] || "Sem Nome"}</span>
      <span style="font-weight:800; color:var(--acc);">${fmt(n(row["Total"] || row["Leads"]))}</span>
    </div>
  `).join('');

  const sortedQual = [...DATA_SUMMARY].sort((a, b) => n(b["Qualificação"]) - n(a["Qualificação"]));

  qualContainer.innerHTML = sortedQual.map(row => {
    const val = n(row["Qualificação"] || row["Taxa"]);
    const color = val > 80 ? 'var(--pos)' : (val > 50 ? 'var(--wrn)' : 'var(--neg)');
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
          <span>${row["Curso"] || "Curso"}</span>
          <span style="font-weight:700; color:${color}">${val}%</span>
        </div>
        <div style="height:4px; background:var(--bd); border-radius:2px; overflow:hidden;">
          <div style="height:100%; width:${val}%; background:${color};"></div>
        </div>
      </div>
    `;
  }).join('');
}

// Iniciar Dashboard
init();

</script>
</body>
</html>
